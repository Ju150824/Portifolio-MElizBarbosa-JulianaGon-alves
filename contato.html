<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
</head>

<body>

<header>
    <h1>Portfólio</h1>

    <div class="menu-icon" onclick="toggleMenu()">
        ☰
    </div>

    <nav id="menu">
        <a href="index.html">Início</a>
        <a href="sobre.html">Sobre</a>
        <a href="habilidades.html">Habilidades</a>
        <a href="cursos.html">Cursos</a>
        <a href="contato.html">Contato</a>
    </nav>
</header>

<main>
    <section class="contato-container">
        <div class="card-contato">
            <h2>Contato</h2>
            <p class="texto-contato">
                Preencha o formulário abaixo para entrar em contato conosco.
            </p>

            <form id="formContato">
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Digite seu nome">

                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="Digite seu e-mail">

                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" placeholder="Escreva sua mensagem" maxlength="200"></textarea>
                <span id="contador">0 / 200 caracteres</span>
                <button type="submit">Enviar</button>
            </form>

            <p id="erro"></p>
        </div>
    </section>
</main>

<footer>
    <p>© 2026 - Maria Eliz e Juliana Gonçalves</p>
</footer>

<script src="script.js"></script>
</body>
</html>
